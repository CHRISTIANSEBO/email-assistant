<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jean — AI Email Assistant · Interactive Demo</title>
<meta name="description" content="A scripted, no-backend walkthrough of Jean, a conversational AI email assistant powered by Claude." />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cat-primary:    #8c50f0;
    --cat-promotions: #f59e0b;
    --cat-social:     #3b82f6;
    --cat-updates:    #10b981;
    --cat-urgent:     #ef4444;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #08060f;
    height: 100dvh;
    overflow: hidden;
    color: #fff;
  }

  .app-layout {
    display: flex;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    background: #08060f;
  }

  /* ── Sidebar ─────────────────────────────── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    height: 100dvh;
    background: rgba(8, 6, 14, 0.95);
    border-right: 1px solid rgba(255, 255, 255, 0.07);
    display: flex;
    flex-direction: column;
    padding: 12px 8px;
    z-index: 10;
  }
  .sidebar-brand {
    font-size: 18px; font-weight: 700; color: rgba(255,255,255,0.9);
    letter-spacing: -0.3px; padding: 8px 8px 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .brand-dot {
    width: 22px; height: 22px; border-radius: 7px;
    background: linear-gradient(135deg, #8c50f0, #5b21d6);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800;
  }
  .new-chat-btn {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 9px 12px; background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
    color: rgba(255,255,255,0.85); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background .15s; margin: 0 4px 8px;
    width: calc(100% - 8px);
  }
  .new-chat-btn:hover { background: rgba(255,255,255,0.12); }
  .sidebar-nav { padding: 4px; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 8px; }
  .sidebar-nav-item {
    display: flex; align-items: center; gap: 9px; width: 100%;
    padding: 9px 12px; background: none; border: none; border-radius: 8px;
    color: rgba(255,255,255,0.55); font-size: 14px; cursor: pointer;
    transition: background .15s, color .15s; text-align: left;
  }
  .sidebar-nav-item:hover, .sidebar-nav-item.active {
    background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.9);
  }
  .sidebar-history { flex: 1; overflow-y: auto; padding: 4px; }
  .sidebar-section-label {
    display: block; font-size: 11px; font-weight: 600; letter-spacing: .06em;
    text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 6px 12px 4px;
  }
  .sidebar-history-item {
    display: block; width: 100%; padding: 7px 12px; background: none;
    border: none; border-radius: 8px; color: rgba(255,255,255,0.5);
    font-size: 13px; text-align: left; cursor: pointer; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; transition: background .15s, color .15s;
  }
  .sidebar-history-item:hover, .sidebar-history-item.active {
    background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85);
  }
  .sidebar-bottom { margin-top: auto; padding: 8px 4px 4px; border-top: 1px solid rgba(255,255,255,0.06); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px; }
  .sidebar-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(140,80,240,0.6); display: flex; align-items: center;
    justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .sidebar-username { font-size: 14px; color: rgba(255,255,255,0.7); }

  /* ── Main ─────────────────────────────── */
  .main { flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden; }

  /* Animated purple veil background (CSS approximation of the app's WebGL veil) */
  .main-bg {
    position: absolute; inset: 0; z-index: 0; overflow: hidden; background: #08060f;
  }
  .main-bg::before, .main-bg::after {
    content: ''; position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.55;
  }
  .main-bg::before {
    width: 720px; height: 520px; top: -180px; left: 20%;
    background: radial-gradient(circle, #6d28d9 0%, #4c1d95 45%, transparent 70%);
    animation: veil1 16s ease-in-out infinite alternate;
  }
  .main-bg::after {
    width: 600px; height: 600px; top: -260px; right: 8%;
    background: radial-gradient(circle, #7c3aed 0%, #2e1065 50%, transparent 72%);
    animation: veil2 20s ease-in-out infinite alternate;
  }
  @keyframes veil1 { from { transform: translate(-40px,0) scale(1); } to { transform: translate(60px,40px) scale(1.15); } }
  @keyframes veil2 { from { transform: translate(0,-20px) scale(1.1); } to { transform: translate(-70px,30px) scale(0.95); } }

  .chat-area { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; align-items: center; overflow: hidden; }

  /* ── Greeting ─────────────────────────────── */
  .greeting {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 20px; text-align: center; padding: 0 24px 40px; width: 100%;
  }
  .greeting-title { font-size: 42px; font-weight: 600; color: rgba(255,255,255,0.92); letter-spacing: -1px; }
  .greeting.hidden { display: none; }

  .greeting-input {
    width: 100%; max-width: 640px; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; overflow: hidden;
  }
  .greeting-input .input-row { display: flex; align-items: center; padding: 16px 16px 14px; min-height: 64px; }
  .greeting-input .fake-input { flex: 1; color: rgba(255,255,255,0.3); font-size: 15px; text-align: left; }
  .greeting-quick { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 12px 16px 14px; border-top: 1px solid rgba(255,255,255,0.06); }

  /* ── Messages ─────────────────────────────── */
  .messages {
    flex: 1; width: 100%; max-width: 820px; overflow-y: auto; padding: 40px 24px 16px;
    display: flex; flex-direction: column; gap: 16px; scrollbar-width: none;
  }
  .messages::-webkit-scrollbar { display: none; }
  .messages.hidden { display: none; }

  .message { padding: 14px 18px; border-radius: 14px; font-size: 15px; line-height: 1.7; word-break: break-word; animation: rise .25s ease; }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .message.user {
    align-self: flex-end; max-width: 72%; background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.9); border-bottom-right-radius: 4px;
  }
  .message.assistant {
    align-self: flex-start; width: 100%; max-width: 680px;
    background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.82); border-bottom-left-radius: 4px;
  }
  .message.assistant.has-cards { max-width: 100%; background: transparent; padding: 0; }
  .message-text-wrap {
    max-width: 680px; background: rgba(255,255,255,0.05); padding: 14px 18px;
    border-radius: 14px 14px 14px 4px; margin-bottom: 8px; font-size: 15px;
    line-height: 1.7; color: rgba(255,255,255,0.82);
  }

  .streaming-cursor {
    display: inline-block; width: 2px; height: 0.85em; background: rgba(255,255,255,0.6);
    margin-left: 2px; vertical-align: middle; border-radius: 1px; animation: blink .7s ease-in-out infinite;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

  /* typing dots */
  .typing-msg { display: flex; align-items: center; gap: 5px; padding: 14px 18px; align-self: flex-start; }
  .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.5); animation: bounce 1.2s ease-in-out infinite; }
  .typing-dot:nth-child(2) { animation-delay: .2s; }
  .typing-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: .4; } 30% { transform: translateY(-6px); opacity: 1; } }

  /* tool status */
  .tool-status { align-self: flex-start; font-size: 13px; color: rgba(255,255,255,0.4); font-style: italic; padding: 6px 18px; display: flex; align-items: center; gap: 8px; }
  .tool-status .spin { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.2); border-top-color: rgba(180,140,255,0.9); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Email cards ─────────────────────────────── */
  .email-cards-wrap { width: 100%; margin-top: 10px; }
  .email-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .email-card--wide { grid-column: 1 / -1; }
  .email-card {
    display: flex; align-items: center; gap: 8px; padding: 8px 11px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
    border-left: 3px solid var(--cat, rgba(255,255,255,0.12)); border-radius: 10px;
    cursor: pointer; transition: transform .18s ease, background .15s, box-shadow .18s;
    animation: rise .3s ease backwards;
  }
  .email-card:hover { transform: translateY(-2px); background: rgba(255,255,255,0.07); box-shadow: 0 6px 24px rgba(0,0,0,0.35); }
  .email-card-initial { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .email-card-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .email-card-name { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.38); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .email-card-subject { font-size: 13px; color: rgba(255,255,255,0.82); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .email-card-badge { flex-shrink: 0; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; border-radius: 4px; padding: 2px 6px; }
  .badge--urgent { color: rgba(239,68,68,0.9); background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); }
  .badge--promotions { color: rgba(245,158,11,0.9); background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); }

  /* ── Confirmation card ─────────────────────────────── */
  .confirm-card {
    align-self: flex-start; background: rgba(255,200,80,0.07); border: 1px solid rgba(255,200,80,0.18);
    border-radius: 12px; padding: 12px 16px; max-width: 80%; animation: rise .25s ease;
  }
  .confirm-prompt { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 10px; white-space: pre-wrap; line-height: 1.6; }
  .confirm-buttons { display: flex; gap: 8px; }
  .btn-allow, .btn-deny { padding: 6px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: opacity .15s; }
  .btn-allow { background: rgba(80,220,130,0.2); color: rgb(100,240,150); border: 1px solid rgba(80,220,130,0.3); }
  .btn-deny { background: rgba(220,80,80,0.2); color: rgb(240,100,100); border: 1px solid rgba(220,80,80,0.3); }
  .confirm-card.resolved { opacity: 0.55; }

  /* ── Quick reply chips ─────────────────────────────── */
  .quick-reply-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; align-self: flex-start; }
  .quick-reply-chip {
    padding: 6px 14px; border-radius: 20px; background: rgba(140,80,240,0.1);
    border: 1px solid rgba(140,80,240,0.28); color: rgba(190,150,255,0.9);
    font-size: 13px; cursor: pointer; transition: background .15s, color .15s; animation: rise .25s ease;
  }
  .quick-reply-chip:hover { background: rgba(140,80,240,0.22); color: #fff; }

  /* ── chips (quick actions) ─────────────────────────────── */
  .chip {
    padding: 6px 14px; border-radius: 20px; background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.65); font-size: 13px; white-space: nowrap;
  }

  /* ── Bottom input (in conversation) ─────────────────────────────── */
  .input-box { width: 100%; max-width: 720px; margin: 0 auto; padding: 0 24px 22px; }
  .input-box.hidden { display: none; }
  .input-fake {
    display: flex; align-items: center; gap: 8px; width: 100%;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px; padding: 14px 12px 14px 16px; color: rgba(255,255,255,0.3); font-size: 15px;
  }
  .send-btn { margin-left: auto; width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.85); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* ── Demo control bar ─────────────────────────────── */
  .demo-bar {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    z-index: 100; display: flex; align-items: center; gap: 12px;
    background: rgba(20,16,30,0.85); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 999px; padding: 8px 10px 8px 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .demo-bar .label { font-size: 12px; color: rgba(255,255,255,0.45); letter-spacing: .03em; }
  .demo-bar .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #10b981; margin-right: 7px; animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .replay-btn {
    padding: 7px 18px; border-radius: 999px; border: none; cursor: pointer;
    background: linear-gradient(135deg, #8c50f0, #6d28d9); color: #fff; font-size: 13px; font-weight: 600;
    transition: filter .15s; font-family: inherit;
  }
  .replay-btn:hover { filter: brightness(1.12); }

  .demo-badge {
    position: fixed; top: 14px; right: 16px; z-index: 100; font-size: 11px;
    color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; padding: 5px 12px; letter-spacing: .04em;
  }

  @media (max-width: 760px) {
    .sidebar { display: none; }
    .greeting-title { font-size: 30px; }
    .email-cards { grid-template-columns: 1fr; }
    .email-card--wide { grid-column: auto; }
  }
</style>
</head>
<body>
  <div class="demo-badge">SCRIPTED DEMO · no real inbox connected</div>

  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand"><span class="brand-dot">J</span> Jean</div>
      <button class="new-chat-btn">＋ &nbsp;New chat</button>
      <nav class="sidebar-nav">
        <button class="sidebar-nav-item active">💬&nbsp; Chat</button>
        <button class="sidebar-nav-item">📥&nbsp; Inbox</button>
        <button class="sidebar-nav-item">🗂️&nbsp; Templates</button>
      </nav>
      <div class="sidebar-history">
        <span class="sidebar-section-label">Today</span>
        <button class="sidebar-history-item active">What's in my inbox?</button>
        <button class="sidebar-history-item">Unsubscribe from promos</button>
        <button class="sidebar-history-item">Draft reply to landlord</button>
        <span class="sidebar-section-label">Yesterday</span>
        <button class="sidebar-history-item">Sort by priority</button>
        <button class="sidebar-history-item">Save "out of office" template</button>
      </div>
      <div class="sidebar-bottom">
        <div class="sidebar-user">
          <div class="sidebar-avatar">A</div>
          <span class="sidebar-username">Alex Rivera</span>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="main-bg"></div>
      <div class="chat-area">
        <!-- Greeting (initial) -->
        <div class="greeting" id="greeting">
          <div class="greeting-title">Hi, I'm Jean</div>
          <div class="greeting-input">
            <div class="input-row"><span class="fake-input">Message Jean…</span></div>
            <div class="greeting-quick">
              <span class="chip">Read inbox</span>
              <span class="chip">Sort by priority</span>
              <span class="chip">Check promotions</span>
              <span class="chip">Unsubscribe</span>
            </div>
          </div>
        </div>

        <!-- Messages (conversation) -->
        <div class="messages hidden" id="messages"></div>

        <!-- Bottom input -->
        <div class="input-box hidden" id="inputBox">
          <div class="input-fake">
            <span id="inputText">Message Jean…</span>
            <span class="send-btn">➤</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Demo controls -->
  <div class="demo-bar">
    <span class="label"><span class="dot"></span><span id="demoStatus">Playing…</span></span>
    <button class="replay-btn" id="replayBtn">↻ Replay</button>
  </div>

<script>
/* ────────────────────────────────────────────────────────────────────────────
   A tiny scripted "player" that replays a Jean conversation. No backend, no
   network — every message, email card, confirmation, and quick reply below is
   canned sample data, but the flow mirrors the real app exactly:
   read → cards → open (with confirmation) → quick replies → send (with confirmation).
   ──────────────────────────────────────────────────────────────────────────── */

const greeting = document.getElementById('greeting');
const messages = document.getElementById('messages');
const inputBox = document.getElementById('inputBox');
const inputText = document.getElementById('inputText');
const demoStatus = document.getElementById('demoStatus');
const replayBtn = document.getElementById('replayBtn');

const sleep = (ms) => new Promise(r => setTimeout(r, ms));
let cancelled = false;
const COLORS = { primary:'#8c50f0', promotions:'#f59e0b', social:'#3b82f6', updates:'#10b981', urgent:'#ef4444' };

const INBOX = [
  { name:'Sarah Chen',       subject:'Re: Q3 launch — action required', cat:'urgent',     wide:true },
  { name:'Chase',            subject:'Your June statement is ready',     cat:'updates' },
  { name:'GitHub',           subject:'[email-assistant] CI passed',      cat:'updates' },
  { name:'LinkedIn',         subject:'Angel and 3 others viewed you',    cat:'social' },
  { name:'GoPro',            subject:'48 hours left — 25% off everything',cat:'promotions' },
  { name:'Notion',           subject:'Your weekly digest',               cat:'updates' },
  { name:'Spotify',          subject:'Your 2026 Wrapped is almost here', cat:'promotions' },
  { name:'Mom',              subject:'Sunday dinner?',                    cat:'primary' },
];

function scrollDown() { messages.scrollTop = messages.scrollHeight; }

function addUser(text) {
  const el = document.createElement('div');
  el.className = 'message user';
  el.textContent = text;
  messages.appendChild(el); scrollDown();
}

async function showTyping(ms) {
  const el = document.createElement('div');
  el.className = 'typing-msg';
  el.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  messages.appendChild(el); scrollDown();
  await sleep(ms);
  el.remove();
}

async function toolStatus(label, ms) {
  const el = document.createElement('div');
  el.className = 'tool-status';
  el.innerHTML = '<span class="spin"></span><span>' + label + '</span>';
  messages.appendChild(el); scrollDown();
  await sleep(ms);
  el.remove();
}

// Stream assistant text token-by-token, like the real SSE endpoint
async function streamAssistant(text, { wrapClass = '' } = {}) {
  const el = document.createElement('div');
  el.className = 'message assistant' + (wrapClass ? ' ' + wrapClass : '');
  messages.appendChild(el);
  const cursor = '<span class="streaming-cursor"></span>';
  const words = text.split(' ');
  let out = '';
  for (let i = 0; i < words.length; i++) {
    if (cancelled) return el;
    out += (i ? ' ' : '') + words[i];
    el.innerHTML = out + cursor;
    scrollDown();
    await sleep(28 + Math.random() * 45);
  }
  el.innerHTML = out;
  scrollDown();
  return el;
}

function addEmailCards(list) {
  const wrap = document.createElement('div');
  wrap.className = 'message assistant has-cards';
  const inner = document.createElement('div');
  inner.className = 'email-cards-wrap';
  const grid = document.createElement('div');
  grid.className = 'email-cards';
  list.forEach((e, i) => {
    const card = document.createElement('div');
    card.className = 'email-card' + (e.wide ? ' email-card--wide' : '');
    card.style.setProperty('--cat', COLORS[e.cat] || 'rgba(255,255,255,0.12)');
    card.style.animationDelay = (i * 55) + 'ms';
    const badge = e.cat === 'urgent'
      ? '<span class="email-card-badge badge--urgent">Urgent</span>'
      : e.cat === 'promotions'
        ? '<span class="email-card-badge badge--promotions">Promo</span>' : '';
    card.innerHTML =
      '<div class="email-card-initial" style="background:' + (COLORS[e.cat] || '#555') + '">' + e.name[0] + '</div>' +
      '<div class="email-card-body">' +
        '<span class="email-card-name">' + e.name + '</span>' +
        '<span class="email-card-subject">' + e.subject + '</span>' +
      '</div>' + badge;
    grid.appendChild(card);
  });
  inner.appendChild(grid);
  wrap.appendChild(inner);
  messages.appendChild(wrap);
  scrollDown();
}

// Confirmation card; resolves when the (auto-clicked) Allow button fires
function confirmCard(promptText) {
  return new Promise(async (resolve) => {
    const el = document.createElement('div');
    el.className = 'confirm-card';
    el.innerHTML =
      '<div class="confirm-prompt">' + promptText + '</div>' +
      '<div class="confirm-buttons">' +
        '<button class="btn-allow">Allow</button>' +
        '<button class="btn-deny">Deny</button>' +
      '</div>';
    messages.appendChild(el); scrollDown();
    const allow = el.querySelector('.btn-allow');
    // Auto-click after a beat to keep the demo moving
    await sleep(1100);
    if (cancelled) { resolve(); return; }
    allow.style.boxShadow = '0 0 0 3px rgba(80,220,130,0.35)';
    await sleep(260);
    el.classList.add('resolved');
    el.querySelector('.confirm-buttons').innerHTML = '<span style="font-size:12px;color:rgba(100,240,150,0.9)">✓ Allowed</span>';
    resolve();
  });
}

function quickReplies(replies) {
  return new Promise(async (resolve) => {
    const wrap = document.createElement('div');
    wrap.className = 'quick-reply-chips';
    replies.forEach(r => {
      const chip = document.createElement('button');
      chip.className = 'quick-reply-chip';
      chip.textContent = r;
      wrap.appendChild(chip);
    });
    messages.appendChild(wrap); scrollDown();
    await sleep(1200);
    if (cancelled) { resolve(null); return; }
    const chosen = wrap.children[0];
    chosen.style.boxShadow = '0 0 0 3px rgba(140,80,240,0.4)';
    await sleep(300);
    // remove the unchosen chips, keep selection visible briefly
    [...wrap.children].forEach(c => { if (c !== chosen) c.remove(); });
    await sleep(250);
    wrap.remove();
    resolve(replies[0]);
  });
}

// Simulate a user "typing" into the bottom input then sending
async function userTypes(text) {
  inputText.style.color = 'rgba(255,255,255,0.9)';
  let out = '';
  for (const ch of text) {
    if (cancelled) return;
    out += ch;
    inputText.textContent = out;
    await sleep(30 + Math.random() * 35);
  }
  await sleep(350);
  inputText.textContent = 'Message Jean…';
  inputText.style.color = 'rgba(255,255,255,0.3)';
  addUser(text);
}

async function run() {
  cancelled = false;
  messages.innerHTML = '';
  demoStatus.textContent = 'Playing…';

  // Start on greeting screen
  greeting.classList.remove('hidden');
  messages.classList.add('hidden');
  inputBox.classList.add('hidden');
  await sleep(1400);
  if (cancelled) return;

  // Transition into conversation
  greeting.classList.add('hidden');
  messages.classList.remove('hidden');
  inputBox.classList.remove('hidden');

  // 1) Read the inbox
  await userTypes("What's in my inbox?");
  await sleep(300);
  await toolStatus('Reading your inbox…', 1500);
  await streamAssistant("You've got 8 new ones. Mostly quiet — but Sarah flagged the Q3 launch as action required, and your Chase statement just landed. Want me to open Sarah's?");
  addEmailCards(INBOX);
  await sleep(900);
  if (cancelled) return;

  // 2) Open the urgent email (confirmation flow)
  await userTypes("Yeah, open Sarah's");
  await sleep(300);
  await confirmCard("Open this email?\n\nFrom: Sarah Chen <sarah.chen@acme.io>\nSubject: Re: Q3 launch — action required");
  await toolStatus('Opening the email…', 1300);
  await streamAssistant("Sarah needs the final launch checklist signed off before EOD tomorrow, and she's asking whether the marketing assets are ready. Nothing blocking on your end — looks like a quick yes. Want to reply?");
  if (cancelled) return;

  // 3) Quick replies → send (confirmation flow)
  const choice = await quickReplies([
    "On it — wrapping up today",
    "Need one more day",
    "Assets are ready 👍",
  ]);
  if (cancelled) return;
  addUser(choice);
  await sleep(300);
  await toolStatus('Drafting your reply…', 1200);
  await confirmCard("Send this email?\n\nTo: sarah.chen@acme.io\nSubject: Re: Q3 launch — action required\n\nHi Sarah — on it, I'll have the checklist signed off and the assets confirmed by end of day today. Thanks! — Alex");
  await toolStatus('Sending…', 1100);
  await streamAssistant("Done! It's on its way to Sarah. That was the only thing that really needed you today — the rest can wait. 🎉");

  await sleep(600);
  demoStatus.textContent = 'Finished';
}

replayBtn.addEventListener('click', async () => {
  cancelled = true;
  await sleep(120);
  run();
});

run();
</script>
